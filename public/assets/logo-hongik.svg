<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White background -->
  <circle cx="100" cy="100" r="99" fill="white"/>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#1a1a40" stroke-width="3.5"/>
  <!-- Middle ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1a1a40" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#1a1a40" stroke-width="1.2"/>

  <!-- Top crown decoration -->
  <path d="M 72 64 L 78 52 L 100 60 L 122 52 L 128 64" fill="none" stroke="#1a1a40" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="78" cy="52" r="3" fill="#1a1a40"/>
  <circle cx="100" cy="46" r="3" fill="#1a1a40"/>
  <circle cx="122" cy="52" r="3" fill="#1a1a40"/>

  <!-- Book / emblem center -->
  <rect x="80" y="78" width="40" height="30" rx="2" fill="none" stroke="#1a1a40" stroke-width="1.8"/>
  <line x1="100" y1="78" x2="100" y2="108" stroke="#1a1a40" stroke-width="1.4"/>
  <!-- Pages suggestion -->
  <line x1="84" y1="85" x2="96" y2="85" stroke="#1a1a40" stroke-width="1"/>
  <line x1="84" y1="90" x2="96" y2="90" stroke="#1a1a40" stroke-width="1"/>
  <line x1="84" y1="95" x2="96" y2="95" stroke="#1a1a40" stroke-width="1"/>
  <line x1="104" y1="85" x2="116" y2="85" stroke="#1a1a40" stroke-width="1"/>
  <line x1="104" y1="90" x2="116" y2="90" stroke="#1a1a40" stroke-width="1"/>
  <line x1="104" y1="95" x2="116" y2="95" stroke="#1a1a40" stroke-width="1"/>

  <!-- 弘 益 characters -->
  <text x="88" y="130" font-family="serif" font-size="11" fill="#1a1a40" text-anchor="middle" font-weight="bold">弘</text>
  <text x="112" y="130" font-family="serif" font-size="11" fill="#1a1a40" text-anchor="middle" font-weight="bold">益</text>

  <!-- 1946 -->
  <text x="100" y="146" font-family="Arial,sans-serif" font-size="9" fill="#1a1a40" text-anchor="middle" letter-spacing="2">1946</text>

  <!-- Korean text arc along top -->
  <defs>
    <path id="topArcHU" d="M 28,100 A 72,72 0 0,1 172,100"/>
  </defs>
  <text font-family="sans-serif" font-size="9.5" fill="#1a1a40" font-weight="600">
    <textPath href="#topArcHU" startOffset="12%">홍익대학교</textPath>
  </text>

  <!-- HONGIK UNIVERSITY text arc along bottom -->
  <defs>
    <path id="bottomArcHU" d="M 22,108 A 78,78 0 0,0 178,108"/>
  </defs>
  <text font-family="Arial,sans-serif" font-size="7.5" fill="#1a1a40" letter-spacing="1.5">
    <textPath href="#bottomArcHU" startOffset="7%">HONGIK  UNIVERSITY</textPath>
  </text>

  <!-- PRO HOMINUM BENEFICIO along middle arc -->
  <defs>
    <path id="midArcHU" d="M 36,100 A 64,64 0 0,1 164,100"/>
  </defs>
  <text font-family="Arial,sans-serif" font-size="6.5" fill="#1a1a40" letter-spacing="1" font-style="italic">
    <textPath href="#midArcHU" startOffset="10%">PRO HOMINUM BENEFICIO</textPath>
  </text>
</svg>
